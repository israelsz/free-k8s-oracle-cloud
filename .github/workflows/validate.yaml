---
name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check -recursive .

      - name: Initialize providers
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate configuration
        run: terraform -chdir=infra/terraform validate

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          printf '%s  %s\n' "${GITLEAKS_LINUX_X64_SHA256}" "${archive}" |
            sha256sum --check
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" gitleaks
          printf '%s\n' "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Scan complete Git history
        run: gitleaks git --redact --verbose --log-opts="--all"
