apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-access
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # The private OKE API server calls cert-manager's admission webhook.
    - from:
        - ipBlock:
            cidr: 10.20.0.0/28
      ports:
        - port: 10250
          protocol: TCP
    # The one-time startup check reaches the same webhook through its Service.
    - from:
        - podSelector: {}
      ports:
        - port: 10250
          protocol: TCP
  egress:
    # Controllers and the startup check need cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # The kubernetes.default Service is translated to this private endpoint.
    - to:
        - ipBlock:
            cidr: 10.20.0.0/28
      ports:
        - port: 6443
          protocol: TCP
    # ACME and DNS-provider APIs use HTTPS. No arbitrary plaintext egress exists.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # The startup check calls the webhook inside this namespace.
    - to:
        - podSelector: {}
      ports:
        - port: 10250
          protocol: TCP
