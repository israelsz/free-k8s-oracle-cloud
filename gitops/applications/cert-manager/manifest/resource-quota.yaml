apiVersion: v1
kind: ResourceQuota
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  hard:
    # Three controllers, their rollout surges, and the startup check Job.
    pods: "7"
    requests.cpu: 500m
    requests.memory: 1Gi
    requests.ephemeral-storage: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    limits.ephemeral-storage: 4Gi
