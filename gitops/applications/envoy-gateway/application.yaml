apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    # Gateway API CRDs must be healthy before this controller is installed.
    argocd.argoproj.io/sync-wave: "-22"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  sources:
    - repoURL: docker.io/envoyproxy
      chart: gateway-helm
      targetRevision: v1.8.3
      helm:
        releaseName: envoy-gateway
        valueFiles:
          - $values/gitops/applications/envoy-gateway/values.yaml

    - repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
      targetRevision: main
      ref: values

    # Namespace network boundaries and resource counts live with the controller.
    - repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
      targetRevision: main
      path: gitops/applications/envoy-gateway/manifest

  # The chart's certificate job writes the webhook CA after Argo creates it.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle

  syncPolicy:
    managedNamespaceMetadata:
      labels:
        # trust-manager distributes the OpenBao CA for its future HTTPS backend.
        openbao-trust: enabled
        pod-security.kubernetes.io/enforce: restricted
        pod-security.kubernetes.io/enforce-version: v1.35
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/audit-version: v1.35
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/warn-version: v1.35
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true

