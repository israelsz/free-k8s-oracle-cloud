apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    # DNS automation starts after External Secrets can deliver its API token.
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns/
      chart: external-dns
      targetRevision: 1.21.1
      helm:
        releaseName: external-dns
        valueFiles:
          - $values/gitops/applications/external-dns/values.yaml

    - repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
      targetRevision: main
      path: gitops/applications/external-dns/manifest

  syncPolicy:
    managedNamespaceMetadata:
      labels:
        # trust-manager places OpenBao's public CA in this namespace.
        openbao-trust: enabled
        pod-security.kubernetes.io/enforce: restricted
        pod-security.kubernetes.io/enforce-version: v1.35
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/audit-version: v1.35
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/warn-version: v1.35
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
