apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-reader
  namespace: external-dns
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao
  namespace: external-dns
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    vault:
      server: https://openbao-active.openbao.svc.cluster.local:8200
      path: secret
      version: v2
      caProvider:
        type: ConfigMap
        name: openbao-internal-ca
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: k8s-prod-external-dns-controller
          serviceAccountRef:
            name: openbao-reader
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: openbao
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: external-dns
  data:
    - secretKey: api-token
      remoteRef:
        key: prod/external-dns/controller/provider-token
        property: api_token
