apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-node-reader
rules:
  # The Service source starts a Node watcher when it calculates targets.
  # All namespaced reads remain limited by the Helm chart's Role.
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-node-reader
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
