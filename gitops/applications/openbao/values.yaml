global:
  # OpenBao has no public route. Internal TLS will be added with cert-manager;
  # until then access is restricted to the cluster and operator tunnel.
  tlsDisable: true

# Secret injection will be introduced deliberately after the server is
# initialized. Do not install a cluster-wide mutating webhook yet.
injector:
  enabled: false

server:
  enabled: true

  image:
    registry: quay.io
    repository: openbao/openbao
    tag: "2.6.0"
    pullPolicy: IfNotPresent

  # OpenBao chart upgrades must not restart the only server without review.
  updateStrategyType: OnDelete
  podManagementPolicy: OrderedReady
  logLevel: info
  logFormat: json
  terminationGracePeriodSeconds: 30
  preStopSleepSeconds: 5

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 512Mi

  ingress:
    enabled: false
  gateway:
    tlsRoute:
      enabled: false
    httpRoute:
      enabled: false
    tlsPolicy:
      enabled: false

  # Kubernetes auth will use TokenReview with this narrowly scoped binding.
  authDelegator:
    enabled: true

  # These values are identifiers, not credentials, but they are tenancy-specific
  # and stay out of the public repo. bootstrap/openbao-prerequisites.sh creates
  # this Secret directly from Terraform outputs without printing the values.
  extraSecretEnvironmentVars:
    - envName: VAULT_OCIKMS_SEAL_KEY_ID
      secretName: openbao-oci-kms
      secretKey: VAULT_OCIKMS_SEAL_KEY_ID
    - envName: VAULT_OCIKMS_CRYPTO_ENDPOINT
      secretName: openbao-oci-kms
      secretKey: VAULT_OCIKMS_CRYPTO_ENDPOINT
    - envName: VAULT_OCIKMS_MANAGEMENT_ENDPOINT
      secretName: openbao-oci-kms
      secretKey: VAULT_OCIKMS_MANAGEMENT_ENDPOINT

  # A read-only root filesystem leaves only these explicit writable locations.
  volumes:
    - name: tmp
      emptyDir:
        sizeLimit: 64Mi
  volumeMounts:
    - name: tmp
      mountPath: /tmp

  readinessProbe:
    enabled: true
    # Sealed or uninitialized servers remain out of Service endpoints.
    path: /v1/sys/health?standbyok=true
    port: 8200
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 3

  livenessProbe:
    # Being sealed or uninitialized is an operator state, not a restart reason.
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
    port: 8200
    failureThreshold: 6
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3

  # Only HTTPS, DNS, OCI instance metadata, and same/client-namespace ingress
  # are allowed. The global Calico policy blocks metadata for ordinary pods.
  networkPolicy:
    enabled: true
    ingress:
      - from:
          - podSelector: {}
        ports:
          - port: 8200
            protocol: TCP
          - port: 8201
            protocol: TCP
      - from:
          - namespaceSelector:
              matchLabels:
                openbao-client: "true"
        ports:
          - port: 8200
            protocol: TCP
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
      - to:
          - ipBlock:
              cidr: 0.0.0.0/0
        ports:
          - port: 443
            protocol: TCP
      # The kubernetes.default Service is translated to the private OKE API
      # endpoint before Calico evaluates this egress traffic.
      - to:
          - ipBlock:
              cidr: 10.20.0.0/28
        ports:
          - port: 6443
            protocol: TCP
      - to:
          - ipBlock:
              cidr: 169.254.169.254/32
        ports:
          - port: 80
            protocol: TCP

  service:
    enabled: true
    active:
      enabled: true
    standby:
      enabled: false
    instanceSelector:
      enabled: true

  dataStorage:
    enabled: true
    size: 50Gi
    mountPath: /openbao/data
    storageClass: oci-bv-retain
    accessMode: ReadWriteOnce
    annotations:
      # The PVC is generated by the StatefulSet, but keep the safety intent on
      # the resulting claim if it is ever adopted by Argo CD.
      argocd.argoproj.io/sync-options: Prune=confirm,Delete=false
    labels:
      app.kubernetes.io/part-of: openbao

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  auditStorage:
    enabled: false

  standalone:
    enabled: false

  # The chart calls this HA mode because Raft is an HA-capable backend. We use
  # one replica intentionally, so storage is recoverable but service is not HA.
  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |-
        ui = false

        listener "tcp" {
          tls_disable = 1
          # The OKE VCN-native pod network is IPv4-only.
          address = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
        }

        storage "raft" {
          path = "/openbao/data"
        }

        # auth_type_api_key defaults to false, so OpenBao uses the current
        # worker's OCI instance principal instead of a private API key.
        seal "ocikms" {}

        service_registration "kubernetes" {}

        # OpenBao 2.6 manages audit devices from server configuration. The
        # default redaction/HMAC behavior stays enabled, so secret values and
        # tokens are not written in plaintext. Kubernetes log rotation bounds
        # local usage; VictoriaLogs will collect these records later.
        audit "file" "stdout" {
          description = "Security audit events collected from pod logs"

          options {
            file_path = "stdout"
          }
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }
    disruptionBudget:
      # A PDB cannot make a single replica available and would block drains.
      enabled: false

  serviceAccount:
    create: true
    name: openbao
    createSecret: false
    serviceDiscovery:
      enabled: true

  statefulSet:
    annotations:
      # Removing the StatefulSet from Git requires an explicit Argo approval.
      argocd.argoproj.io/sync-options: Prune=confirm
    securityContext:
      pod:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      container:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

  configAnnotation: true

ui:
  enabled: false

csi:
  enabled: false

snapshotAgent:
  # Snapshot credentials and off-cluster restore tests come after initialization.
  enabled: false

serverTelemetry:
  serviceMonitor:
    enabled: false
  prometheusRules:
    enabled: false
  grafanaDashboard:
    enabled: false
