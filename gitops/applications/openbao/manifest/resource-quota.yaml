apiVersion: v1
kind: ResourceQuota
metadata:
  name: openbao-storage
  namespace: openbao
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hard:
    # One reviewed Block Volume claim of exactly 50 GiB is allowed here.
    persistentvolumeclaims: "1"
    requests.storage: 50Gi
    oci-bv-retain.storageclass.storage.k8s.io/persistentvolumeclaims: "1"
    oci-bv-retain.storageclass.storage.k8s.io/requests.storage: 50Gi
