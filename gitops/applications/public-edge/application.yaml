apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-edge
  namespace: argocd
  annotations:
    # Wait for Envoy, cert-manager, and the Cloudflare-backed ClusterIssuer.
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  source:
    repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
    targetRevision: main
    path: gitops/applications/public-edge/manifest

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 20
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true

