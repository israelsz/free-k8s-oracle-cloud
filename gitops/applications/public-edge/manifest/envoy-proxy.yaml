apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: public-edge
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
        pod:
          labels:
            platform.israheck.com/edge-proxy: public
          # Keep one proxy on each worker. A voluntary drain can remove one,
          # while an unavailable worker never prevents the other from serving.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  platform.israheck.com/edge-proxy: public
      envoyPDB:
        minAvailable: 1
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          # OKE's cloud controller creates the OCI Flexible Load Balancer.
          oci.oraclecloud.com/load-balancer-type: lb
          # Use a controller-owned frontend NSG, not Terraform-owned security
          # lists. The Terraform worker NSG is the cluster's default backend.
          oci.oraclecloud.com/security-rule-management-mode: NSG
          # The Always Free allowance is exactly one 10 Mbps load balancer.
          service.beta.kubernetes.io/oci-load-balancer-shape: flexible
          service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
          service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
        # The origin accepts HTTPS only from Cloudflare's published IPv4 ranges.
        # The cluster and load-balancer subnet are IPv4-only.
        loadBalancerSourceRanges:
          - 173.245.48.0/20
          - 103.21.244.0/22
          - 103.22.200.0/22
          - 103.31.4.0/22
          - 141.101.64.0/18
          - 108.162.192.0/18
          - 190.93.240.0/20
          - 188.114.96.0/20
          - 197.234.240.0/22
          - 198.41.128.0/17
          - 162.158.0.0/15
          - 104.16.0.0/13
          - 104.24.0.0/14
          - 172.64.0.0/13
          - 131.0.72.0/22

