apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-ops
  namespace: envoy-gateway-system
spec:
  secretName: argocd-ops-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - argocd.israheck.com
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-ops
  namespace: envoy-gateway-system
spec:
  secretName: openbao-ops-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - openbao.israheck.com
