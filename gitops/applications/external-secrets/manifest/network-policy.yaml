apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-access
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # The private OKE API server calls the validating webhook on TCP 10250.
    - from:
        - ipBlock:
            cidr: 10.20.0.0/28
      ports:
        - port: 10250
          protocol: TCP
  egress:
    # All controllers need cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # The kubernetes.default Service is translated to this private endpoint
    # before Calico evaluates egress, as with the OpenBao server itself.
    - to:
        - ipBlock:
            cidr: 10.20.0.0/28
      ports:
        - port: 6443
          protocol: TCP
    # Only the OpenBao server in its own namespace is a valid secret backend.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openbao
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - port: 8200
          protocol: TCP
