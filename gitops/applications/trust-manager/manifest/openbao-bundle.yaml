apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: openbao-internal-ca
  annotations:
    # The chart's webhook and controller must be healthy before this custom
    # resource is admitted. Argo waits for wave 0 before starting wave 1.
    argocd.argoproj.io/sync-wave: "1"
spec:
  sources:
    - secret:
        # trust-manager is restricted to reading sources from cert-manager.
        name: openbao-root-ca
        key: tls.crt
  target:
    configMap:
      key: ca.crt
      metadata:
        labels:
          app.kubernetes.io/name: openbao-internal-ca
          app.kubernetes.io/part-of: openbao
    # Applications opt in to this public trust anchor namespace by namespace.
    namespaceSelector:
      matchLabels:
        openbao-trust: enabled
