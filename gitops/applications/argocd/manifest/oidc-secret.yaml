apiVersion: v1
kind: ServiceAccount
metadata:
  # This identity is used only by External Secrets when reading Argo CD's
  # Google client from OpenBao.
  name: openbao-reader
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  # A namespaced store prevents other namespaces from reusing this connection.
  name: openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    vault:
      server: https://openbao-active.openbao.svc.cluster.local:8200
      path: secret
      version: v2
      # trust-manager distributes this public CA only to opted-in namespaces.
      caProvider:
        type: ConfigMap
        name: openbao-internal-ca
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: k8s-prod-argocd-server-google-oidc
          serviceAccountRef:
            name: openbao-reader
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-google-oidc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: openbao
  target:
    name: argocd-google-oidc
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        # Argo CD ignores secret references from Secrets without this label.
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientID
      remoteRef:
        key: prod/argocd/server/google-oidc
        property: clientID
    - secretKey: clientSecret
      remoteRef:
        key: prod/argocd/server/google-oidc
        property: clientSecret
