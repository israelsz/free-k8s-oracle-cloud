# Shared by the initial bootstrap and Argo CD's later self-management.

global:
  image:
    tag: v3.4.5
  revisionHistoryLimit: 2
  logging:
    format: json
    level: info

configs:
  cm:
    admin.enabled: true
    exec.enabled: false
    # Argo CD uses its native OIDC implementation; Dex remains disabled.
    url: https://argocd.israheck.com
    oidc.config: |
      name: Google
      issuer: https://accounts.google.com
      clientID: $argocd-google-oidc:clientID
      clientSecret: $argocd-google-oidc:clientSecret
      requestedScopes: ["openid", "profile", "email"]
      requestedIDTokenClaims: {"email": {"essential": true}}
  rbac:
    # An authenticated but unmapped Google account receives no permissions.
    policy.default: role:authenticated
    policy.csv: |
      g, iariaspanez@gmail.com, role:admin
    scopes: "[email]"

server:
  replicas: 1
  service:
    type: ClusterIP
    # Envoy uses this named port together with the BackendTLSPolicy below.
    servicePortHttpsAppProtocol: https

  # Argo CD automatically watches its conventional argocd-server-tls Secret.
  # cert-manager replaces the server's generated self-signed certificate
  # without storing a private key in Helm values or Git.
  certificate:
    enabled: true
    domain: argocd-server.argocd.svc.cluster.local
    additionalHosts:
      - argocd-server
      - argocd-server.argocd
      - argocd-server.argocd.svc
    duration: 2160h
    renewBefore: 360h
    issuer:
      group: cert-manager.io
      kind: ClusterIssuer
      name: openbao-ca
    privateKey:
      algorithm: ECDSA
      size: 256
      encoding: PKCS8
      rotationPolicy: Always
    usages:
      - server auth
      - digital signature
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
      argocd.argoproj.io/sync-options: Prune=confirm

  # Envoy terminates the browser-facing connection and then starts a separate,
  # CA-verified TLS connection to Argo CD's internal Service.
  backendTLSPolicy:
    enabled: true
    targetRefs:
      - group: ""
        kind: Service
        name: argocd-server
        sectionName: https
    validation:
      hostname: argocd-server.argocd.svc.cluster.local
      caCertificateRefs:
        - group: ""
          kind: ConfigMap
          name: openbao-internal-ca

  emptyDir:
    sizeLimit: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 512Mi

controller:
  replicas: 1
  emptyDir:
    sizeLimit: 512Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 750m
      memory: 768Mi
      ephemeral-storage: 1Gi

repoServer:
  replicas: 1
  emptyDir:
    sizeLimit: 2Gi
  copyutil:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
        ephemeral-storage: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi
        ephemeral-storage: 64Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi
      ephemeral-storage: 2Gi

applicationSet:
  replicas: 0
  emptyDir:
    sizeLimit: 256Mi
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      cpu: 250m
      memory: 192Mi
      ephemeral-storage: 256Mi

dex:
  enabled: false

notifications:
  enabled: false

redis:
  enabled: true
  exporter:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      cpu: 250m
      memory: 192Mi
      ephemeral-storage: 256Mi

redis-ha:
  enabled: false

redisSecretInit:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeral-storage: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
      ephemeral-storage: 64Mi

commitServer:
  enabled: false
