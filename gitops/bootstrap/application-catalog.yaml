apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: application-catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/israelsz/free-k8s-oracle-cloud.git
    targetRevision: main
    path: gitops/applications
    directory:
      recurse: true
      include: '*/application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
    syncOptions:
      - PruneLast=true
